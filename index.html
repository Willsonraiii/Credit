<style>
*{font-family:'Inter','Noto Sans Devanagari',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#020617;color:#e2e8f0}
.glass{background:rgba(15,23,42,0.9);backdrop-filter:blur(16px);border:1px solid rgba(51,65,85,0.4)}
.card{background:rgba(15,23,42,0.6);border:1px solid rgba(51,65,85,0.3);border-radius:14px}
.card-hover{transition:all .2s ease}
.card-hover:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-weight:600;padding:12px;border-radius:12px}
.btn-primary:active{transform:scale(0.97)}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;font-weight:600;padding:12px;border-radius:12px}
.btn-secondary{background:rgba(51,65,85,0.5);border:1px solid rgba(71,85,105,0.5);color:#e2e8f0;padding:12px;border-radius:12px}
.input-field{background:rgba(15,23,42,0.8);border:1px solid rgba(51,65,85,0.5);color:#f1f5f9;padding:12px;border-radius:12px;width:100%}
.input-field:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fi .25s ease-out}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-up{animation:su .3s ease-out}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:fi .3s ease;max-width:90%;text-align:center}
.toast-success{background:rgba(6,78,59,0.95);border:1px solid #059669;color:#34d399}
.toast-error{background:rgba(127,29,29,0.95);border:1px solid #dc2626;color:#fca5a5}
.toast-info{background:rgba(30,58,138,0.95);border:1px solid #3b82f6;color:#93c5fd}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal-content{background:#0f172a;border:1px solid rgba(51,65,85,0.5);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease-out}
@media(min-width:640px){.modal-overlay{align-items:center}.modal-content{border-radius:16px;max-width:480px;max-height:85vh}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid}
.lang-np *{font-family:'Noto Sans Devanagari','Inter',system-ui,sans-serif}
.pin-input{width:56px;height:56px;text-align:center;font-size:24px;font-weight:700;border-radius:12px;background:rgba(15,23,42,0.8);border:1px solid rgba(51,65,85,0.5);color:#f1f5f9}
.pin-input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
.user-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600}
</style>
<base target="_blank">
</head>

// ==================== DATE/TIME ====================
var NM = ["बैशाख","जेठ","असार","श्रावण","भदौ","असोज","कार्तिक","मंसिर","पुष","माघ","फाल्गुन","चैत"];
var ND = ["आइतबार","सोमबार","मंगलबार","बुधबार","बिहीबार","शुक्रबार","शनिबार"];
var ED = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var EM = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function gnd() {
  var n = new Date();
  return { y: n.getFullYear() + 56, m: NM[(n.getMonth() + 3) % 12], d: ((n.getDate() + 15) % 30) || 15, w: ND[n.getDay()] };
}

function gd() {
  var n = new Date();
  if (L === "np") { var np = gnd(); return np.w + ", " + np.d + " " + np.m + " " + np.y; }
  return ED[n.getDay()] + ", " + n.getDate() + " " + EM[n.getMonth()] + " " + n.getFullYear();
}

function fd(d) { try { return new Date(d).toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"}); } catch(e) { return d; } }

function da(d) {
  var days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (L === "np") return days === 0 ? "आज" : days === 1 ? "हिजो" : days + " दिन अघि";
  return days === 0 ? "Today" : days === 1 ? "Yesterday" : days + " days ago";
}

function fn(n) {
  if (L === "np") return "रु. " + new Intl.NumberFormat("en-IN").format(Math.abs(n || 0));
  return "Rs. " + new Intl.NumberFormat("en-IN").format(Math.abs(n || 0));
}

function t(k) { return TX[L][k] || k; }

function ut() {
  var n = new Date();
  var el = document.getElementById("nepali-time");
  if (el) el.textContent = n.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit", hour12:true});
}
setInterval(ut, 1000);

// ==================== PIN LOGIN ====================
function enterPin(d) {
  if (PI.length < 4) { PI += d; updPin(); if (PI.length === 4) setTimeout(doLogin, 200); }
}
function backspacePin() { PI = PI.slice(0, -1); updPin(); }
function clearPin() { PI = ""; updPin(); }
function updPin() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById("pin-dot-" + i);
    if (dot) dot.className = "w-3 h-3 rounded-full " + (i < PI.length ? "bg-emerald-400" : "bg-slate-700");
  }
}
function quickLogin(pin) { PI = pin; updPin(); setTimeout(doLogin, 200); }

function doLogin() {
  var user = USERS.find(function(u) { return u.pin === PI; });
  if (user) {
    CU = user;
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("screen-app").classList.remove("hidden");
    var hr = document.getElementById("header-role");
    hr.textContent = L === "np" ? user.nameNp : user.name;
    hr.style.color = user.color;
    toast(t("welcome") + ", " + (L === "np" ? user.nameNp : user.name) + "!", "success");
    applyLang();
    showPage("dashboard");
    PI = ""; updPin();
  } else {
    toast(t("invalidPin"), "error");
    PI = ""; updPin();
  }
}

function handleLogout() {
  CU = null;
  document.getElementById("screen-app").classList.add("hidden");
  document.getElementById("screen-login").classList.remove("hidden");
  PI = ""; updPin();
}

// ==================== LANGUAGE ====================
function toggleLanguage() {
  L = L === "en" ? "np" : "en";
  var s = DB.get("settings", {}); s.lang = L; DB.set("settings", s);
  toast(L === "np" ? "भाषा नेपालीमा परिवर्तन गरियो" : "Language changed to English", "success");
  applyLang();
  if (CP === "dashboard") renderDashboard();
  else if (CP === "customers") renderCustomers();
  else if (CP === "transactions") renderTransactions();
  else if (CP === "settings") renderSettings();
}

function applyLang() {
  document.body.classList.toggle("lang-np", L === "np");
  document.querySelectorAll("[data-en][data-np]").forEach(function(el) { el.textContent = el.getAttribute("data-" + L); });
  if (CU) {
    var hr = document.getElementById("header-role");
    hr.textContent = L === "np" ? CU.nameNp : CU.name;
    hr.style.color = CU.color;
  }
}

// ==================== TOAST & MODAL ====================
function toast(msg, type) {
  var existing = document.querySelector(".toast");
  if (existing) existing.remove();
  if (TT) clearTimeout(TT);
  var el = document.createElement("div");
  el.className = "toast toast-" + type; el.textContent = msg;
  document.body.appendChild(el);
  TT = setTimeout(function() { el.remove(); }, 3000);
}
function openModal(html) { document.getElementById("modal-body").innerHTML = html; document.getElementById("modal-overlay").classList.remove("hidden"); document.body.style.overflow = "hidden"; }
function closeModal() { document.getElementById("modal-overlay").classList.add("hidden"); document.body.style.overflow = ""; }

function renderNav() {
  document.getElementById("bottom-nav").innerHTML = NAV.map(function(item) {
    var active = CP === item.id || (CP === "customer-detail" && item.id === "customers");
    var label = L === "np" ? item.lNp : item.lEn;

function showPage(page) {
  CP = page; renderNav();
  var content = document.getElementById("main-content");
  content.innerHTML = ""; content.classList.remove("animate-in");
  void content.offsetWidth; content.classList.add("animate-in");
  window.scrollTo(0, 0);
  if (page === "dashboard") renderDashboard();
  else if (page === "customers") renderCustomers();
  else if (page === "transactions") renderTransactions();
  else if (page === "settings") renderSettings();
}
