<style>
*{font-family:'Inter','Noto Sans Devanagari',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{background:#020617;color:#e2e8f0}
.glass{background:rgba(15,23,42,0.9);backdrop-filter:blur(16px);border:1px solid rgba(51,65,85,0.4)}
.card{background:rgba(15,23,42,0.6);border:1px solid rgba(51,65,85,0.3);border-radius:14px}
.card-hover{transition:all .2s ease}
.card-hover:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,#059669,#10b981);color:#fff;font-weight:600;padding:12px;border-radius:12px}
.btn-primary:active{transform:scale(0.97)}
.btn-danger{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;font-weight:600;padding:12px;border-radius:12px}
.btn-secondary{background:rgba(51,65,85,0.5);border:1px solid rgba(71,85,105,0.5);color:#e2e8f0;padding:12px;border-radius:12px}
.input-field{background:rgba(15,23,42,0.8);border:1px solid rgba(51,65,85,0.5);color:#f1f5f9;padding:12px;border-radius:12px;width:100%}
.input-field:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fi .25s ease-out}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-up{animation:su .3s ease-out}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:fi .3s ease;max-width:90%;text-align:center}
.toast-success{background:rgba(6,78,59,0.95);border:1px solid #059669;color:#34d399}
.toast-error{background:rgba(127,29,29,0.95);border:1px solid #dc2626;color:#fca5a5}
.toast-info{background:rgba(30,58,138,0.95);border:1px solid #3b82f6;color:#93c5fd}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal-content{background:#0f172a;border:1px solid rgba(51,65,85,0.5);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease-out}
@media(min-width:640px){.modal-overlay{align-items:center}.modal-content{border-radius:16px;max-width:480px;max-height:85vh}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid}
.lang-np *{font-family:'Noto Sans Devanagari','Inter',system-ui,sans-serif}
.pin-input{width:56px;height:56px;text-align:center;font-size:24px;font-weight:700;border-radius:12px;background:rgba(15,23,42,0.8);border:1px solid rgba(51,65,85,0.5);color:#f1f5f9}
.pin-input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
.user-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600}
</style>
<base target="_blank">
</head>

// ==================== DATE/TIME ====================
var NM = ["बैशाख","जेठ","असार","श्रावण","भदौ","असोज","कार्तिक","मंसिर","पुष","माघ","फाल्गुन","चैत"];
var ND = ["आइतबार","सोमबार","मंगलबार","बुधबार","बिहीबार","शुक्रबार","शनिबार"];
var ED = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var EM = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function gnd() {
  var n = new Date();
  return { y: n.getFullYear() + 56, m: NM[(n.getMonth() + 3) % 12], d: ((n.getDate() + 15) % 30) || 15, w: ND[n.getDay()] };
}

function gd() {
  var n = new Date();
  if (L === "np") { var np = gnd(); return np.w + ", " + np.d + " " + np.m + " " + np.y; }
  return ED[n.getDay()] + ", " + n.getDate() + " " + EM[n.getMonth()] + " " + n.getFullYear();
}

function fd(d) { try { return new Date(d).toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"}); } catch(e) { return d; } }

function da(d) {
  var days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (L === "np") return days === 0 ? "आज" : days === 1 ? "हिजो" : days + " दिन अघि";
  return days === 0 ? "Today" : days === 1 ? "Yesterday" : days + " days ago";
}

function fn(n) {
  if (L === "np") return "रु. " + new Intl.NumberFormat("en-IN").format(Math.abs(n || 0));
  return "Rs. " + new Intl.NumberFormat("en-IN").format(Math.abs(n || 0));
}

function t(k) { return TX[L][k] || k; }

function ut() {
  var n = new Date();
  var el = document.getElementById("nepali-time");
  if (el) el.textContent = n.toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit", hour12:true});
}
setInterval(ut, 1000);

// ==================== PIN LOGIN ====================
function enterPin(d) {
  if (PI.length < 4) { PI += d; updPin(); if (PI.length === 4) setTimeout(doLogin, 200); }
}
function backspacePin() { PI = PI.slice(0, -1); updPin(); }
function clearPin() { PI = ""; updPin(); }
function updPin() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById("pin-dot-" + i);
    if (dot) dot.className = "w-3 h-3 rounded-full " + (i < PI.length ? "bg-emerald-400" : "bg-slate-700");
  }
}
function quickLogin(pin) { PI = pin; updPin(); setTimeout(doLogin, 200); }

function doLogin() {
  var user = USERS.find(function(u) { return u.pin === PI; });
  if (user) {
    CU = user;
    document.getElementById("screen-login").classList.add("hidden");
    document.getElementById("screen-app").classList.remove("hidden");
    var hr = document.getElementById("header-role");
    hr.textContent = L === "np" ? user.nameNp : user.name;
    hr.style.color = user.color;
    toast(t("welcome") + ", " + (L === "np" ? user.nameNp : user.name) + "!", "success");
    applyLang();
    showPage("dashboard");
    PI = ""; updPin();
  } else {
    toast(t("invalidPin"), "error");
    PI = ""; updPin();
  }
}

function handleLogout() {
  CU = null;
  document.getElementById("screen-app").classList.add("hidden");
  document.getElementById("screen-login").classList.remove("hidden");
  PI = ""; updPin();
}

function handleEditCustomer(id, form) {
  var fd = new FormData(form);
  var customers = DB.get("customers", []);

  var name = fd.get("name");
  customers[idx] = {
    ...customers[idx], name: name, nameEn: name, phone: fd.get("phone"), address: fd.get("address") || "",
    creditLimit: parseInt(fd.get("creditLimit")) || customers[idx].creditLimit, status: fd.get("status"), notes: fd.get("notes") || "",
    lastEditedBy: CU.id, lastEditedByName: CU.name
  };
  DB.set("customers", customers);
  closeModal();
  toast(t("customerUpdated"), "success");
  showCustomerDetail(id);
}

function handleAddCredit(cid, form) {
  var fd = new FormData(form);
  var amt = parseInt(fd.get("amount")) || 0;
  var customers = DB.get("customers", []);
  var c = customers.find(function(x) { return x.id === cid; });
  if (!c) return;
  if (c.balance + amt > c.creditLimit) { toast(t("exceedsLimit"), "error"); return; }
  var transactions = DB.get("transactions", []);
  transactions.push({
    id: "t" + Date.now(), customerId: cid, type: "CREDIT", amount: amt,
    description: fd.get("description"), date: fd.get("date"),
    createdBy: CU.id, createdByName: CU.name, createdAt: new Date().toISOString()
  });
  c.balance += amt;
  if (c.status === "CLOSED") c.status = "ACTIVE";
  DB.set("transactions", transactions);
  DB.set("customers", customers);
  closeModal();
  toast(t("creditAdded") + ": " + fn(amt), "success");
  showCustomerDetail(cid);
}

function handleAddPayment(cid, form) {
  var fd = new FormData(form);
  var amt = parseInt(fd.get("amount")) || 0;
  var customers = DB.get("customers", []);
  var c = customers.find(function(x) { return x.id === cid; });
  if (!c) return;

  toast(t("paymentRecorded") + ": " + fn(amt), "success");

  var backups = DB.get("backups", []);
  var lastBackup = backups.length > 0 ? backups[backups.length - 1] : null;
  var lastBackupTime = lastBackup ? fd(lastBackup.createdAt) + " " + new Date(lastBackup.createdAt).toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"}) : t("never");

  var content = document.getElementById("main-content");
  var html = "";

  html += '<div class="mb-5"><h2 class="text-xl font-bold text-white">' + t("settings") + '</h2><p class="text-xs text-slate-400">' + t("loggedInAs") + ': <span style="color:' + CU.color + '">' + (L === "np" ? CU.nameNp : CU.name) + '</span></p></div>';

  html += '<div class="card p-4 mb-4"><h3 class="text-sm font-semibold text-white mb-3">' + t("language") + '</h3><div class="flex gap-2"><button onclick="toggleLanguage()" class="flex-1 py-3 rounded-xl btn-secondary text-sm flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>' + (L === "en" ? t("switchLang") : t("switchEng")) + '</button></div></div>';

  html += '<div class="card p-4 mb-4"><h3 class="text-sm font-semibold text-white mb-3">' + t("storeInfo") + '</h3><div class="flex items-center gap-3 mb-4"><div class="w-14 h-14 rounded-xl bg-gradient-to-br from-emerald-600 to-emerald-800 flex items-center justify-center"><svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div><div><p class="text-sm font-bold text-white">Yalambar Store</p><p class="text-xs text-slate-500">Credit Tracker v2.0</p></div></div><div class="space-y-2 text-sm"><div class="flex justify-between"><span class="text-slate-400">' + t("currency") + '</span><span class="text-white">' + t("nepaliRupee") + '</span></div><div class="flex justify-between"><span class="text-slate-400">' + t("totalCustomers") + '</span><span class="text-white">' + customers.length + '</span></div><div class="flex justify-between"><span class="text-slate-400">' + t("totalTransactions") + '</span><span class="text-white">' + transactions.length + '</span></div><div class="flex justify-between"><span class="text-slate-400">' + t("totalCreditGiven") + '</span><span class="text-white">' + fn(totalCredit) + '</span></div></div></div>';

  html += '<div class="card p-4 mb-4"><h3 class="text-sm font-semibold text-white mb-1">' + t("backup") + '</h3><p class="text-xs text-slate-500 mb-1">' + t("backupDesc") + '</p><p class="text-xs text-slate-600 mb-3">' + t("lastBackup") + ': ' + lastBackupTime + '</p><div class="space-y-2"><button onclick="createCloudBackup()" class="w-full py-3 rounded-xl btn-primary text-sm flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>' + t("backupNow") + '</button><button onclick="restoreFromBackup()" class="w-full py-3 rounded-xl btn-secondary text-sm flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>' + t("restore") + '</button></div></div>';

  html += '<div class="card p-4 mb-4"><h3 class="text-sm font-semibold text-white mb-3">' + t("dataManagement") + '</h3><button onclick="exportData()" class="w-full py-3 rounded-xl btn-secondary text-sm flex items-center justify-center gap-2 mb-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>' + t("exportData") + '</button><button onclick="confirmResetData()" class="w-full py-3 rounded-xl border border-red-500/30 text-red-400 text-sm font-medium hover:bg-red-500/10 transition-colors flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>' + t("resetAllData") + '</button></div>';

  html += '<div class="card p-4"><h3 class="text-sm font-semibold text-white mb-3">' + t("about") + '</h3><p class="text-xs text-slate-400 leading-relaxed">' + t("aboutText") + '</p><p class="text-xs text-slate-600 mt-2">' + t("builtWith") + '</p></div>';
  content.innerHTML = html;
}

// ==================== CLOUD BACKUP ====================
function createCloudBackup() {
  var data = {
    customers: DB.get("customers", []),
    transactions: DB.get("transactions", []),
    settings: DB.get("settings", {}),
    createdAt: new Date().toISOString(),
    createdBy: CU.id,
    createdByName: CU.name,
    version: "2.0"
  };
  var backups = DB.get("backups", []);
  backups.push(data);
  if (backups.length > 10) backups = backups.slice(-10);
  DB.set("backups", backups);
  toast(t("backupSuccess") + " " + fd(data.createdAt), "success");
  renderSettings();
}

function restoreFromBackup() {
  var backups = DB.get("backups", []);
  if (backups.length === 0) { toast(t("noBackupFound"), "error"); return; }
  var html = '<div class="p-5"><h3 class="text-lg font-bold text-white mb-4">' + t("restore") + '</h3><div class="space-y-2 max-h-64 overflow-y-auto">';
  backups.slice().reverse().forEach(function(b, idx) {
    var actualIdx = backups.length - 1 - idx;
    var ds = fd(b.createdAt) + " " + new Date(b.createdAt).toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
    var un = uName(b.createdBy);
    html += '<div class="card p-3 cursor-pointer hover:bg-slate-800/50" onclick="performRestore(' + actualIdx + ')"><div class="flex items-center justify-between"><div><p class="text-sm text-white font-medium">' + ds + '</p><p class="text-[10px] text-slate-500">' + b.customers.length + ' ' + t("customersCount").toLowerCase() + ', ' + b.transactions.length + ' ' + t("entries") + '</p><p class="text-[10px] text-slate-600">' + t("by") + ' ' + un + '</p></div><svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg></div></div>';
  });
  html += '</div><div class="flex gap-3 mt-4"><button onclick="closeModal()" class="flex-1 btn-secondary text-sm">' + t("cancel") + '</button></div></div>';
  openModal(html);
}

function performRestore(idx) {
  var backups = DB.get("backups", []);
  if (!backups[idx]) { toast(t("noBackupFound"), "error"); return; }
  var b = backups[idx];
  DB.set("customers", b.customers);
  DB.set("transactions", b.transactions);
  if (b.settings) DB.set("settings", b.settings);
  closeModal();
  toast(t("restoreSuccess"), "success");
  showPage("dashboard");
}

// ==================== EXPORT & RESET ====================
function exportData() {
  var data = { customers: DB.get("customers", []), transactions: DB.get("transactions", []), exportedAt: new Date().toISOString(), exportedBy: CU.name };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "yalambar-store-data-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
  URL.revokeObjectURL(url);
  toast(t("dataExported"), "success");
}

function confirmResetData() {
  openModal('<div class="p-5"><div class="w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4"><svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div><h3 class="text-lg font-bold text-white text-center mb-2">' + t("resetAllData") + '?</h3><p class="text-sm text-slate-400 text-center mb-5">' + t("resetConfirm") + '</p><div class="flex gap-3"><button onclick="closeModal()" class="flex-1 btn-secondary text-sm">' + t("cancel") + '</button><button onclick="resetAllData()" class="flex-1 btn-danger text-sm">' + t("resetAllData") + '</button></div></div>');
}

function resetAllData() {
  localStorage.removeItem("ys_customers");
  localStorage.removeItem("ys_transactions");
  localStorage.removeItem("ys_settings");
  localStorage.removeItem("ys_backups");
  initData();
  closeModal();
  toast(t("dataReset"), "info");
  showPage("dashboard");
}

// ==================== INIT ====================
initData();
</script>
</body>
</html>
